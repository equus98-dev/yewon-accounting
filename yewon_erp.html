  <style>
    /* 재무보고서/자산관리 메뉴 전용 연두색 스타일 */
    .nav-item.special-green-item {

      border-left: 3px solid #22c55e !important;
      margin-bottom: 4px;
    }

    .nav-item.special-green-item:hover {
      background: rgba(22, 163, 74, 0.15) !important;
    }

    .nav-item.special-green-item.active {
      background: linear-gradient(90deg, #16a34a, #22c55e) !important;
      color: white !important;
    }

    .nav-item.special-green-item.active .nav-icon {
      color: white !important;
    }

    #back-to-top {
      display: none;
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 999;
      border: none;
      outline: none;
      background: linear-gradient(135deg, #1e3a8a 0%, #166534 100%);
      color: white;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 50px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: translateY(20px);
    }

    #back-to-top.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    #back-to-top:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      filter: brightness(1.1);
    }

    #back-to-top:active {
      transform: scale(0.95);
    }

    @media (max-width: 768px) {
      #back-to-top {
        bottom: 20px;
        right: 20px;
        padding: 10px 15px;
      }
    }
  </style>

  <script>
    // 서비스 워커 등록 및 업데이트 로직
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          reg.onupdatefound = () => {
            const installingWorker = reg.installing;
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                if (confirm('새로운 버전이 업데이트되었습니다. 페이지를 새로고침하시겠습니까?')) {
                  location.reload();
                }
              }
            };
          };
        });
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          location.reload();
        }
      });
    }
  </script>
