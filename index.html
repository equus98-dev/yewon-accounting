    <script>
        // 서비스 워커 등록 및 업데이트 로직
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // 새로운 서비스 워커가 설치됨 -> 사용자에게 알리거나 자동 리로드
                                console.log('New content is available; please refresh.');
                                if (confirm('새로운 버전이 업데이트되었습니다. 페이지를 새로고침하시겠습니까?')) {
                                    location.reload();
                                }
                            }
                        };
                    };
                });
            });

            // 컨트롤러가 바뀌면 (새 sw가 활성화되면) 자동 새로고침
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    location.reload();
                }
            });
        }

        // 초기화 및 라우팅 제어
        (async function init() {
            try {
                // 1. D1에서 모든 데이터 로드 (LocalStorage 대신 사용)
                await db.init();

                // 2. 기본 관리자 계정 생성 (계정이 없을 경우)
                Auth.initDefaultAdmin();

                // 3. 기존 세션 확인 및 자동 로그인
                if (Auth.isLoggedIn()) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-layout').style.display = 'flex';
                    App.init();
                }
            } catch (e) {
                console.error('Core init failed:', e);
                alert('시스템 초기화 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
            }
        })();

        async function analyzeDraftWithAI(base64Data) {
            try {
              helpers.showToast('이미지에서 텍스트를 인식하고 있습니다. 잠시만 기다려 주세요...', 'info', 6000);
              
              // Tesseract.js를 이용한 클라이언트 사이드 OCR
              const result = await Tesseract.recognize(base64Data, 'kor+eng', {
                logger: m => console.log(m)
              });
              
              const fullText = result.data.text;
              console.log('OCR Extracted Text:', fullText);

              let title = '';
              let docNo = '';

              // 1. 제목 추출 (키워드 매칭)
              const titleMatch = fullText.match(/제\s*목\s*[:\s]+([^\n]+)/) || fullText.match(/제목\s*[:\s]+([^\n]+)/);
              if (titleMatch) title = titleMatch[1].trim();

              // 2. 문서번호(시행) 추출
              const docNoMatch = fullText.match(/(?:시\s*행|시행)\s*[:\s]*([^\s(]+-[^\s(]+)/) || 
                                 fullText.match(/(?:시\s*행|시행)\s*([가-힣a-zA-Z\s]*\([가-힣\s]*\))?(-|\s)*(\d+)/);
              if (docNoMatch) {
                  docNo = docNoMatch[0].replace(/시\s*행|시행/g, '').trim();
              }

              let filledCount = 0;
              if (title) {
                document.getElementById('v-draft-title').value = title;
                filledCount++;
              }
              if (docNo) {
                document.getElementById('v-draft-doc-no').value = docNo;
                filledCount++;
              }

              if (filledCount > 0) {
                helpers.showToast(`이미지에서 ${filledCount}개 정보를 인식했습니다.`, 'success');
                prepareVoucher(true);
              } else {
                helpers.showToast('텍스트를 찾지 못했습니다. 화질이 좋은 사진으로 다시 시도해 주세요.', 'info');
              }
            } catch (err) {
              console.error('OCR Failed:', err);
              helpers.showToast('문자 인식에 실패했습니다. 수동으로 입력해 주세요.', 'warning');
            }
          }

        // 로그인 처리
        function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            errorEl.classList.remove('show');

            if (!username || !password) {
                errorEl.textContent = '아이디와 비밀번호를 입력해 주세요.';
                errorEl.classList.add('show');
                return;
            }

            const result = Auth.login(username, password);
            if (!result.ok) {
                errorEl.textContent = result.message;
                errorEl.classList.add('show');
                document.getElementById('login-password').value = '';
                return;
            }

            // 로그인 성공 → 앱 표시
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-layout').style.display = 'flex';
            App.init();
        }

        // 비밀번호 표시 토글
        function toggleLoginPassword(icon) {
            const input = document.getElementById('login-password');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }
    </script>
