        async function analyzeDraftWithAI(base64Data) {
            try {
              helpers.showToast('?대?吏?먯꽌 ?띿뒪?몃? ?몄떇?섍퀬 ?덉뒿?덈떎. ?좎떆留?湲곕떎??二쇱꽭??..', 'info', 6000);

              const result = await Tesseract.recognize(base64Data, 'kor+eng', {
                logger: m => console.log(m)
              });
              
              const fullText = result.data.text;
              console.log('OCR Extracted Text:', fullText);

              let title = '';
              let docNo = '';

              // 1. ?쒕ぉ 異붿텧 (?ㅼ썙??留ㅼ묶)
              const titleMatch = fullText.match(/??s*紐?s*[:\s]+([^\n]+)/) || fullText.match(/?쒕ぉ\s*[:\s]+([^\n]+)/);
              if (titleMatch) title = titleMatch[1].trim();

              const docNoMatch = fullText.match(/(?:??s*???쒗뻾)\s*[:\s]*([^\s(]+-[^\s(]+)/) || 
                                 fullText.match(/(?:??s*???쒗뻾)\s*([媛-?즑-zA-Z\s]*\([媛-??s]*\))?(-|\s)*(\d+)/);
              if (docNoMatch) {
                  docNo = docNoMatch[0].replace(/??s*???쒗뻾/g, '').trim();
              }

              let filledCount = 0;
              if (title) {
                document.getElementById('v-draft-title').value = title;
                filledCount++;
              }
              if (docNo) {
                document.getElementById('v-draft-doc-no').value = docNo;
                filledCount++;
              }

              if (filledCount > 0) {
                helpers.showToast(`?대?吏?먯꽌 ${filledCount}媛??뺣낫瑜??몄떇?덉뒿?덈떎.`, 'success');
